name: 云端编译 (Cloud Build)

on:
  push:
    branches: [main, feat/workspace-redesign]
    tags: ['v*']
  workflow_dispatch:
    inputs:
      platform:
        description: '目标平台 (留空=全部)'
        required: false
        default: 'all'
        type: choice
        options: ['all', 'windows', 'macos', 'linux']

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── 第一步：构建前端 ──────────────────────────
  build-frontend:
    runs-on: ubuntu-latest
    outputs:
      dist-hash: ${{ steps.hash.outputs.hash }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: 安装 pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: 移除国内镜像（CI 走官方源）
        run: |
          rm -f .npmrc vue-vben-admin/.npmrc

      - name: 安装前端依赖 & 构建
        run: |
          cd vue-vben-admin
          pnpm install --no-frozen-lockfile
          pnpm run build:antd

      - name: 移至 Electron 静态资源目录
        run: |
          mkdir -p public/dist
          cp -r vue-vben-admin/apps/web-antd/dist/* public/dist/

      - name: 缓存构建产物
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: public/dist/
          retention-days: 1

  # ── 第二步：打包 Windows ────────────────────────
  build-windows:
    needs: build-frontend
    if: ${{ github.event.inputs.platform == 'all' || github.event.inputs.platform == 'windows' || github.event_name != 'workflow_dispatch' }}
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: 下载前端构建产物
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: public/dist/

      - name: 移除国内镜像（CI 走官方源）
        shell: bash
        run: |
          rm -f .npmrc frontend/.npmrc

      - name: 安装依赖
        run: npm install

      - name: 启用 DevTools
        shell: pwsh
        run: |
          $content = Get-Content electron/config/config.prod.js -Raw
          $content = $content -replace 'config.openDevTools = false;', "config.openDevTools = { mode: 'undocked' };"
          Set-Content electron/config/config.prod.js -Value $content -NoNewline

      - name: 打包
        run: npm run build-w

      - name: 上传 exe
        uses: actions/upload-artifact@v4
        with:
          name: 拾光-windows-x64
          path: out/*.exe
          retention-days: 30

      - name: 上传 release asset (仅在发版时)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: out/*.exe

  # ── 第三步：打包 macOS ──────────────────────────
  build-macos:
    needs: build-frontend
    if: ${{ github.event.inputs.platform == 'all' || github.event.inputs.platform == 'macos' || github.event_name != 'workflow_dispatch' }}
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: 下载前端构建产物
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: public/dist/

      - name: 移除国内镜像（CI 走官方源）
        run: |
          rm -f .npmrc frontend/.npmrc

      - name: 安装依赖
        run: npm install

      - name: 启用 DevTools
        run: |
          node -e "const fs=require('fs');const f='electron/config/config.prod.js';fs.writeFileSync(f,fs.readFileSync(f,'utf8').replace('config.openDevTools = false;','config.openDevTools = { mode: \"undocked\" };'))"

      - name: 打包
        run: npm run build-m

      - name: 上传 dmg
        uses: actions/upload-artifact@v4
        with:
          name: 拾光-macos-x64
          path: out/*.dmg
          retention-days: 30

      - name: 上传 release asset (仅在发版时)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: out/*.dmg

  # ── 第四步：打包 Linux ──────────────────────────
  build-linux:
    needs: build-frontend
    if: ${{ github.event.inputs.platform == 'all' || github.event.inputs.platform == 'linux' || github.event_name != 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: 下载前端构建产物
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: public/dist/

      - name: 移除国内镜像（CI 走官方源）
        run: |
          rm -f .npmrc frontend/.npmrc

      - name: 安装依赖
        run: npm install

      - name: 启用 DevTools
        run: |
          node -e "const fs=require('fs');const f='electron/config/config.prod.js';fs.writeFileSync(f,fs.readFileSync(f,'utf8').replace('config.openDevTools = false;','config.openDevTools = { mode: \"undocked\" };'))"

      - name: 打包
        run: npm run build-l

      - name: 上传 deb
        uses: actions/upload-artifact@v4
        with:
          name: 拾光-linux-x64
          path: out/*.deb
          retention-days: 30

      - name: 上传 release asset (仅在发版时)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: out/*.deb
